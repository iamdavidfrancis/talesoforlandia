2007:
  slug: swords
  name: Swords of Orlandia
  year: 2007
  timeline-text: "Two princes pitted against each other in a battle of good versus evil. Who will win, the wise Horus, or his brother the brave Hesperus?"

2008:
  slug: swords-2
  name: "Swords of Orlandia: Throne Into Chaos"
  year: 2008
  timeline-text: "King Horus has died, and his son Validus must take his place and restore Orlandia to its former glory. Can he defeat the mysterious Emperor or will he fall victim to the Emperor's schemes?"

2009:
  slug: swords-3
  name: "Swords of Orlandia: The Khaz'Radan Prophecy"
  year: 2009
  timeline-text: "&ldquo;Defeat me if you think you can, or serve me if you wish. Until that day you are all… banished from Orlandia!&rdquo;<br><br>Those were the final words uttered from the treacherous mouth of Corvdius, the once supposed loyal sage to Prince Validus, only to be revealed the banished Emperor of the Yaoguai! Much time has passed and there has been much unrest in Orlandia. Many citizens of Orlandia, along with the mysterious Fae folk, have begun to form a resistance to restore freedom for all in their once glorious kingdom. The Emperor has responded by offering riches and high rank to those who would help crush the rebellion. The great battle between the Shadowfowl and the Anarchs is about to begin. Who will prevail?"

2010:
  slug: skies
  name: Skies of Orlandia
  year: 2010
  timeline-text: "New technologies have brought Orlandia to the air! Many factions compete for resources, which one will take the day? Now the Orlandia Sky Defense Force protect the country with their loyal pilots, aerologists, and &ldquo;Air Knights&rdquo;. The Benevolent Order of Stone Mages keeps the city in the sky. Members of this secret society are the only ones who know how to bless the floatstones. Members of the Orlandia Engineering Society keep the city running smoothly. These tradesman, docksmen, miners, and laborers keep everything running, from the plumbing to the air ships. The League of Privateers for Free Trade and Acquisitions is marred with the reputation of being populated by pirates and thieves. These pirates have been in a longstanding conflict with the OSDF, ever since the pirates &ldquo;acquired&rdquo; the OSDF's prized air fortress."

2011:
  slug: neo
  name: Conquerors of Neo-Orlandia
  year: 2011
  timeline-text: "After the floating city of Orlandia came crashing down, new powers rose trying to control the city. The Order of Neo-Orlandia rules Orlandia with an iron fist. Queen Octantis upholds order in the city by any means necessary, and the Order carries out her will. In response to the cruel actions of the Order, a resistance has sprung up among Orlandia's disenfranchised and POLARIS will do whatever it takes to return the power to the people. Led by the elusive Sweet Red Vinyl, POLARIS will attempt to defeat the Order. Outside of the city, where the Order has less control, the Jesters have risen up with their own definition of &ldquo;power&rdquo;. This faction does not wish to control Orlandia. With their leader, The Bandit King, they seek only to see the world burn. The Bandit King's lust for Bloodshed means that only Orlandia's complete destruction will appease him.<br><br>Which faction will secure Orlandia? The powerful Order? The POLARIS resistance? The homicidal Jesters?"

2012:
  slug: wyldes
  name: Wyldes of Orlandia
  year: 2012
  timeline-text: "In the time since the Jesters destroyed the city of Neo-Orlandia, nature has reclaimed what is rightfully hers. What was once the great city is now the Wyldewood, home to some of the strangest creatures imaginable and vast resources.<br><br>The NuHelix corporation seeks to claim the resources the Wyldewood has to offer, with no regard for the creatures that live there. The Wyldewood Preservation Society seeks to stop them at all cost and defend these creatures. Who will succeed?"

2013:
  slug: rocket
  name: Rocket Rangers of Orlandia
  year: 2013
  timeline-text: "The city of Orlandia is now the Lunar colony of Orlandia. The Rocket Rangers defend the moon and explore the stars. Lead by Sky Masterson, they seek to explore the universe. Their exploration is cut short when the meet General Growler, leader of the Felixians.<br><br>Can Sky lead the Rocket Rangers to victory? Or will the Felixians destroy Lunar Orlandia?"

2014:
  slug: rocket-2
  name: Rocket Rangers of Orlandia II
  year: 2014
  timeline-text: "With General Growler defeated, the Rocket Rangers and the Felixians have joined forces to mine Khaz from the asteroid belt. They aren't the only ones though as the UET are on their way to get some Khaz of their own. Captain Ketch, owner of Ketch Import Export, is trying to build up his company of <s>pirates and thieves</s> legitimate businessmen.<br><br>Who will find a way to mine the most Khaz?"

2015:
  slug: witch
  name: Curse of the White Witch
  year: 2015
  timeline-text: "An evil force is creeping through the once prosperous land of Orlandia. Can the Bear and Raven clans defeat this mysterious foe?"

2016:
  slug: crisis
  name: Crisis on Infinite Orlandias
  year: 2016
  timeline-text: "Portals throughout history are opening and people from out of time are coming through. Team Earthquake and Team Lightning must figure out how to stop the evil Porphyrion from accomplishing their dastardly goals."

2017:
  slug: spirits
  name: School Spirits
  year: 2017
  timeline-text: "Yamata High has always been an odd school, some say haunted. Not that this would stop the Moyosu and Dorenchi social clubs from sneaking in every night to claim the best hang out spots.<br><br>Luckily those ghost stories are just stories... or are they?"

